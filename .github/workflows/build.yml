name: Build edl-ng

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build-cli:
    name: CLI (${{ matrix.os_short }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, os_short: windows, rid_prefix: win,   arch: x64 }
          - { os: windows-latest, os_short: windows, rid_prefix: win,   arch: arm64 }
          - { os: ubuntu-latest,  os_short: linux,   rid_prefix: linux, arch: x64 }
          - { os: ubuntu-latest,  os_short: linux,   rid_prefix: linux, arch: arm64 }
          - { os: macos-latest,   os_short: macos,   rid_prefix: osx,   arch: x64 }
          - { os: macos-latest,   os_short: macos,   rid_prefix: osx,   arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oE '<EdlNgVersion>[^<]+</EdlNgVersion>' Directory.Build.props | head -1 | sed -E 's|</?EdlNgVersion>||g')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse <Version> from Directory.Build.props"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Install ARM64 cross tools (Linux arm64)
        if: matrix.os_short == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm zlib1g-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Publish CLI
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          RID="${{ matrix.rid_prefix }}-${{ matrix.arch }}"
          OUT="cli_publish"
          dotnet publish QCEDL.CLI/QCEDL.CLI.csproj \
            --configuration Release \
            --runtime "$RID" \
            --self-contained true \
            -p:DebugType=None -p:DebugSymbols=false \
            -o "$OUT"
          cp LICENSE "$OUT/LICENSE"
          cp README.md "$OUT/README.md"
          rm -f "$OUT"/*.xml
          if [ "${{ matrix.os_short }}" = "macos" ]; then
            find "$OUT" -name '*.dSYM' -type d -exec rm -rf {} + 2>/dev/null || true
          fi
          echo "rid=$RID"                                              >> "$GITHUB_OUTPUT"
          echo "out=$OUT"                                              >> "$GITHUB_OUTPUT"
          echo "base=edl-ng-${{ matrix.os_short }}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Zip CLI (Windows)
        if: matrix.os_short == 'windows'
        shell: pwsh
        run: |
          $zip = "${{ steps.publish.outputs.base }}.zip"
          Compress-Archive -Path "${{ steps.publish.outputs.out }}\*" -DestinationPath $zip

      - name: Zip CLI (Unix)
        if: matrix.os_short != 'windows'
        shell: bash
        run: |
          ZIP="${{ steps.publish.outputs.base }}.zip"
          ( cd "${{ steps.publish.outputs.out }}" && zip -r "$GITHUB_WORKSPACE/$ZIP" . )

      - name: Upload CLI zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.publish.outputs.base }}-zip
          path: ${{ steps.publish.outputs.base }}.zip
          if-no-files-found: error
          retention-days: 7

      - name: Install deb/rpm build tools
        if: matrix.os_short == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm

      - name: Build CLI deb
        if: matrix.os_short == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x packaging/deb/build-cli-deb.sh
          DEB_ARCH=$( [ "${{ matrix.arch }}" = "arm64" ] && echo "arm64" || echo "amd64" )
          mkdir -p "$GITHUB_WORKSPACE/linux_cli_pkgs"
          packaging/deb/build-cli-deb.sh \
            "${{ steps.publish.outputs.out }}" \
            "$DEB_ARCH" \
            "${{ steps.version.outputs.version }}" \
            "$GITHUB_WORKSPACE/linux_cli_pkgs/edl-ng_${{ steps.version.outputs.version }}_${DEB_ARCH}.deb" \
            "$GITHUB_WORKSPACE"

      - name: Build CLI rpm
        if: matrix.os_short == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x packaging/rpm/build-rpm.sh
          RPM_ARCH=$( [ "${{ matrix.arch }}" = "arm64" ] && echo "aarch64" || echo "x86_64" )
          packaging/rpm/build-rpm.sh \
            edl-ng \
            "${{ steps.publish.outputs.out }}" \
            "$RPM_ARCH" \
            "${{ steps.version.outputs.version }}" \
            "$GITHUB_WORKSPACE/linux_cli_pkgs" \
            "$GITHUB_WORKSPACE"

      - name: Build CLI pacman package
        if: matrix.os_short == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$GITHUB_WORKSPACE/pac_stage_cli"
          mkdir -p "$STAGE/publish"
          cp packaging/arch/cli/PKGBUILD "$STAGE/"
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" "$STAGE/PKGBUILD"
          cp LICENSE "$STAGE/LICENSE"
          cp -r resources/udev "$STAGE/udev"
          cp -a "${{ steps.publish.outputs.out }}/." "$STAGE/publish/"
          CARCH=$( [ "${{ matrix.arch }}" = "arm64" ] && echo "aarch64" || echo "x86_64" )
          docker run --rm -v "$STAGE:/pkg" -w /pkg -e CARCH="$CARCH" \
            archlinux:latest bash -euc '
              pacman -Syu --noconfirm --needed base-devel libusb >/dev/null
              useradd -m builder
              chown -R builder /pkg
              sudo -u builder env CARCH='"$CARCH"' makepkg --holdver --skipinteg --nodeps -f
            '
          mkdir -p "$GITHUB_WORKSPACE/linux_cli_pkgs"
          find "$STAGE" -maxdepth 1 -name '*.pkg.tar.zst' -exec mv {} "$GITHUB_WORKSPACE/linux_cli_pkgs/" \;

      - name: Upload Linux CLI packages
        if: matrix.os_short == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: edl-ng-linux-${{ matrix.arch }}-linuxpkgs
          path: linux_cli_pkgs/*
          if-no-files-found: error
          retention-days: 7

  build-gui:
    name: GUI (${{ matrix.os_short }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, os_short: windows, rid_prefix: win,   arch: x64 }
          - { os: windows-latest, os_short: windows, rid_prefix: win,   arch: arm64 }
          - { os: ubuntu-latest,  os_short: linux,   rid_prefix: linux, arch: x64 }
          - { os: ubuntu-latest,  os_short: linux,   rid_prefix: linux, arch: arm64 }
          - { os: macos-latest,   os_short: macos,   rid_prefix: osx,   arch: x64 }
          - { os: macos-latest,   os_short: macos,   rid_prefix: osx,   arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oE '<EdlNgVersion>[^<]+</EdlNgVersion>' Directory.Build.props | head -1 | sed -E 's|</?EdlNgVersion>||g')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse <Version> from Directory.Build.props"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Publish GUI
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          RID="${{ matrix.rid_prefix }}-${{ matrix.arch }}"
          OUT="gui_publish"
          dotnet publish QCEDL.GUI/QCEDL.GUI.csproj \
            --configuration Release \
            --runtime "$RID" \
            --self-contained true \
            -p:PublishAot=false \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -p:DebugType=None -p:DebugSymbols=false \
            -o "$OUT"
          rm -f "$OUT"/*.xml "$OUT"/*.pdb
          if [ -f LICENSE ]; then cp LICENSE "$OUT/LICENSE"; fi
          if [ -f README.md ]; then cp README.md "$OUT/README.md"; fi
          find "$OUT" -name '*.dSYM' -type d -exec rm -rf {} + 2>/dev/null || true
          echo "rid=$RID"                                                  >> "$GITHUB_OUTPUT"
          echo "out=$OUT"                                                  >> "$GITHUB_OUTPUT"
          echo "base=qcedl-gui-${{ matrix.os_short }}-${{ matrix.arch }}"  >> "$GITHUB_OUTPUT"

      - name: Publish AOT helper (macOS)
        if: matrix.os_short == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          RID="${{ matrix.rid_prefix }}-${{ matrix.arch }}"
          dotnet publish QCEDL.Helper/QCEDL.Helper.csproj \
            --configuration Release \
            --runtime "$RID" \
            --self-contained true \
            -p:PublishAot=true \
            -p:PublishTrimmed=true \
            -p:PublishSingleFile=true \
            -p:StripSymbols=true \
            -p:TrimmerRemoveSymbols=true \
            -p:DebugType=None -p:DebugSymbols=false \
            -o helper_publish
          find helper_publish -name '*.dSYM' -type d -exec rm -rf {} + 2>/dev/null || true
          cp helper_publish/edl-ng-helper "${{ steps.publish.outputs.out }}/edl-ng-helper"
          chmod +x "${{ steps.publish.outputs.out }}/edl-ng-helper"
          file "${{ steps.publish.outputs.out }}/edl-ng-helper"

      # -------- Windows: zip --------
      - name: Zip GUI (Windows)
        if: matrix.os_short == 'windows'
        shell: pwsh
        run: |
          $zip = "${{ steps.publish.outputs.base }}.zip"
          Compress-Archive -Path "${{ steps.publish.outputs.out }}\*" -DestinationPath $zip

      - name: Upload GUI zip (Windows)
        if: matrix.os_short == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.publish.outputs.base }}-zip
          path: ${{ steps.publish.outputs.base }}.zip
          if-no-files-found: error
          retention-days: 7

      # -------- macOS: .app + codesign + .dmg + notarize --------
      - name: Assemble .app
        if: matrix.os_short == 'macos'
        shell: bash
        run: |
          chmod +x packaging/macos/build-app.sh packaging/macos/build-dmg.sh
          ICON=""
          if [ -f QCEDL.GUI/macOS/AppIcon.icns ]; then
            ICON=QCEDL.GUI/macOS/AppIcon.icns
          fi
          ./packaging/macos/build-app.sh "${{ steps.publish.outputs.out }}" qcedl-gui.app \
            QCEDL.GUI/macOS/Info.plist "${{ steps.version.outputs.version }}" "$ICON"

      - name: Import Developer ID cert
        if: matrix.os_short == 'macos'
        env:
          APPLE_DEVELOPER_ID_CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_DEVELOPER_ID_CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          # Prepend our keychain to the search list so codesign can find the identity.
          OTHERS=$(security list-keychains -d user | tr -d '"' | xargs)
          security list-keychains -d user -s "$KEYCHAIN" $OTHERS
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::Imported cert but no Developer ID Application identity was found"
            exit 1
          fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Codesign .app
        if: matrix.os_short == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          IDENTITY="${SIGN_IDENTITY:--}"
          if [ "$IDENTITY" = "-" ]; then
            echo "::warning::No Developer ID cert available; falling back to ad-hoc signing."
          else
            echo "Using signing identity: $IDENTITY"
          fi
          # Sign inner Mach-O binaries (dylibs + helper exe) without entitlements, inside-out.
          find qcedl-gui.app/Contents/MacOS -type f -name '*.dylib' -print0 | \
            xargs -0 -I{} codesign --force --options runtime --timestamp --sign "$IDENTITY" "{}"
          if [ -f qcedl-gui.app/Contents/MacOS/edl-ng-helper ]; then
            codesign --force --options runtime --timestamp \
              --entitlements QCEDL.GUI/macOS/entitlements.plist \
              --sign "$IDENTITY" qcedl-gui.app/Contents/MacOS/edl-ng-helper
          fi
          # Sign main executable + outer bundle with entitlements.
          codesign --force --options runtime --timestamp \
            --entitlements QCEDL.GUI/macOS/entitlements.plist \
            --sign "$IDENTITY" qcedl-gui.app/Contents/MacOS/qcedl-gui
          codesign --force --options runtime --timestamp \
            --entitlements QCEDL.GUI/macOS/entitlements.plist \
            --sign "$IDENTITY" qcedl-gui.app
          codesign --verify --deep --strict --verbose=2 qcedl-gui.app

      - name: Build .dmg
        if: matrix.os_short == 'macos'
        shell: bash
        run: |
          DMG="${{ steps.publish.outputs.base }}.dmg"
          ./packaging/macos/build-dmg.sh qcedl-gui.app "$DMG" qcedl-gui 512m

      - name: Notarize .dmg
        if: matrix.os_short == 'macos'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          DMG="${{ steps.publish.outputs.base }}.dmg"
          KEY_FILE="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8" | base64 -d > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          xcrun notarytool submit "$DMG" \
            --key "$KEY_FILE" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          rm -f "$KEY_FILE"

      - name: Upload GUI .dmg (macOS)
        if: matrix.os_short == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.publish.outputs.base }}-dmg
          path: ${{ steps.publish.outputs.base }}.dmg
          if-no-files-found: error
          retention-days: 7

      # -------- Linux: deb + rpm + pacman --------
      - name: Install deb/rpm build tools
        if: matrix.os_short == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm

      - name: Build GUI deb
        if: matrix.os_short == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x packaging/deb/build-gui-deb.sh
          DEB_ARCH=$( [ "${{ matrix.arch }}" = "arm64" ] && echo "arm64" || echo "amd64" )
          mkdir -p "$GITHUB_WORKSPACE/linux_gui_pkgs"
          packaging/deb/build-gui-deb.sh \
            "${{ steps.publish.outputs.out }}" \
            "$DEB_ARCH" \
            "${{ steps.version.outputs.version }}" \
            "$GITHUB_WORKSPACE/linux_gui_pkgs/qcedl-gui_${{ steps.version.outputs.version }}_${DEB_ARCH}.deb" \
            "$GITHUB_WORKSPACE"

      - name: Build GUI rpm
        if: matrix.os_short == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x packaging/rpm/build-rpm.sh
          RPM_ARCH=$( [ "${{ matrix.arch }}" = "arm64" ] && echo "aarch64" || echo "x86_64" )
          packaging/rpm/build-rpm.sh \
            qcedl-gui \
            "${{ steps.publish.outputs.out }}" \
            "$RPM_ARCH" \
            "${{ steps.version.outputs.version }}" \
            "$GITHUB_WORKSPACE/linux_gui_pkgs" \
            "$GITHUB_WORKSPACE"

      - name: Build GUI pacman package
        if: matrix.os_short == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$GITHUB_WORKSPACE/pac_stage_gui"
          mkdir -p "$STAGE/publish"
          cp packaging/arch/gui/PKGBUILD "$STAGE/"
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" "$STAGE/PKGBUILD"
          cp packaging/arch/gui/qcedl-gui.desktop "$STAGE/"
          mkdir -p "$STAGE/icons"
          cp resources/icons/edl-ng-*.png "$STAGE/icons/" 2>/dev/null || true
          cp LICENSE "$STAGE/LICENSE"
          cp -r resources/udev "$STAGE/udev"
          cp -a "${{ steps.publish.outputs.out }}/." "$STAGE/publish/"
          CARCH=$( [ "${{ matrix.arch }}" = "arm64" ] && echo "aarch64" || echo "x86_64" )
          docker run --rm -v "$STAGE:/pkg" -w /pkg -e CARCH="$CARCH" \
            archlinux:latest bash -euc '
              pacman -Syu --noconfirm --needed base-devel libusb >/dev/null
              useradd -m builder
              chown -R builder /pkg
              sudo -u builder env CARCH='"$CARCH"' makepkg --holdver --skipinteg --nodeps -f
            '
          mkdir -p "$GITHUB_WORKSPACE/linux_gui_pkgs"
          find "$STAGE" -maxdepth 1 -name '*.pkg.tar.zst' -exec mv {} "$GITHUB_WORKSPACE/linux_gui_pkgs/" \;

      - name: Upload Linux GUI packages
        if: matrix.os_short == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: qcedl-gui-linux-${{ matrix.arch }}-linuxpkgs
          path: linux_gui_pkgs/*
          if-no-files-found: error
          retention-days: 7
