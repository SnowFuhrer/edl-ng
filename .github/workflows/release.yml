name: edl-ng Release

on:
  workflow_dispatch:
    inputs:
      action_run_id:
        description: 'Action run ID to use for the release'
        required: true
        default: 0
        type: number
      version:
        description: 'Version to use for the release'
        required: true
        default: 'v1.0'
        type: string
      make_latest:
        description: 'Make this release the latest'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    if: contains('["strongtz"]', github.actor)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ inputs.action_run_id }}
          path: dl

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          # Every uploaded artifact was unpacked into dl/<artifact-name>/...
          # Pick out the shipping files (zips, debs, rpms, pacman pkgs, dmgs)
          # and drop them flat into release/.
          find dl -type f \
            \( -name '*.zip' -o -name '*.deb' -o -name '*.rpm' \
               -o -name '*.pkg.tar.zst' -o -name '*.dmg' \) \
            -exec cp -n {} release/ \;
          ls -la release/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.version }}
          draft: true
          make_latest: ${{ inputs.make_latest }}
          files: |
            release/*.zip
            release/*.deb
            release/*.rpm
            release/*.pkg.tar.zst
            release/*.dmg
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ inputs.version }}
